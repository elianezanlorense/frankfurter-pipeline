# .github/workflows/main.yml
name: Pipeline CI

on:
  push:
    branches:
      - '*'

# ESSA É A CHAVE: Dá permissão para os workflows filhos gerarem o token do GCP
permissions:
  contents: read
  id-token: write

jobs:
  test-auth:
    uses: ./.github/workflows/test-auth.yml
    secrets: inherit

  terraform:
    needs: test-auth
    uses: ./.github/workflows/terraform.yml
    secrets: inherit
    with:
      branch: ${{ github.ref_name }}
      
  airflow:
    needs: terraform
    uses: ./.github/workflows/airflow.yml
    secrets: inherit

  dbt:
    needs: terraform
    uses: ./.github/workflows/dbt.yml
    secrets: inherit