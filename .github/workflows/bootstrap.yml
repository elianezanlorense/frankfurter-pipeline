name: Bootstrap

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/state
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="github_repository=${{ github.repository }}"

      - name: Set GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PROJECT=$(terraform output -raw project_id)
          BUCKET=$(terraform output -raw bucket_name)
          SA=$(terraform output -raw terraform_runner_sa_email)
          WIF=$(terraform output -raw workload_identity_provider)

          gh secret set GCP_PROJECT_ID   --repo ${{ github.repository }} --body "$PROJECT"
          gh secret set GCP_TF_BUCKET    --repo ${{ github.repository }} --body "$BUCKET"
          gh secret set GCP_SA_EMAIL     --repo ${{ github.repository }} --body "$SA"
          gh secret set GCP_WIF_PROVIDER --repo ${{ github.repository }} --body "$WIF"

          echo "✅ Secrets configurados para projeto: $PROJECT"
