name: dbt CI

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  dbt:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: ./dbt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          zoocamp_project:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: oauth
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: frankfurter_dev
                location: EU
                threads: 4
          EOF

      - name: Check if BQ dataset exists
        id: bq_check
        run: |
          DATASET=$(bq ls --project_id=${{ secrets.GCP_PROJECT_ID }} 2>/dev/null | grep frankfurter_dev || true)
          if [ -z "$DATASET" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Dataset não existe, pulando dbt"
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: dbt deps
        if: steps.bq_check.outputs.exists == 'true'
        run: dbt deps

      - name: dbt run
        if: steps.bq_check.outputs.exists == 'true'
        run: dbt run

      - name: dbt test
        if: steps.bq_check.outputs.exists == 'true'
        run: dbt test
