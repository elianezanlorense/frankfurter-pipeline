name: Terraform Pipeline

on:
  push:
    branches:
      - '*'

jobs:
  bootstrap-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ./bootstrap/state

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ./bootstrap/state

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./bootstrap/state

  bootstrap-apply:
    runs-on: ubuntu-latest
    needs: bootstrap-validate
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ./bootstrap/state

      - name: Terraform Apply Bootstrap
        run: terraform apply -auto-approve -var-file=terraform.tfvars
        working-directory: ./bootstrap/state

        bootstrap-apply:
    runs-on: ubuntu-latest
    needs: bootstrap-validate
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"

      - name: Remove backend config temporarily
        run: |
          sed -i 's/backend "gcs"/#backend "gcs"/' bootstrap/state/state.tf
          sed -i 's/bucket = "frankfurter-tf-state"/#bucket = "frankfurter-tf-state"/' bootstrap/state/state.tf
          sed -i 's/prefix = "bootstrap\/state"/#prefix = "bootstrap\/state"/' bootstrap/state/state.tf
        working-directory: ./bootstrap/state

      - name: Terraform Init
        run: terraform init
        working-directory: ./bootstrap/state

      - name: Terraform Apply Bootstrap
        run: terraform apply -auto-approve -var-file=terraform.tfvars
        working-directory: ./bootstrap/state

      - name: Restore backend config
        run: |
          sed -i 's/#backend "gcs"/backend "gcs"/' bootstrap/state/state.tf
          sed -i 's/#bucket = "frankfurter-tf-state"/bucket = "frankfurter-tf-state"/' bootstrap/state/state.tf
          sed -i 's/#prefix = "bootstrap\/state"/prefix = "bootstrap\/state"/' bootstrap/state/state.tf
        working-directory: ./bootstrap/state

      - name: Migrate state to GCS
        run: terraform init -migrate-state -force-copy
        working-directory: ./bootstrap/state
 

  terraform-plan:
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -var-file=env/dev/terraform.tfvars
        working-directory: ./terraform

  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=env/dev/terraform.tfvars
        working-directory: ./terraform
