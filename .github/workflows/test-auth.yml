name: Teste GCP Auth

on:
  workflow_call:
  workflow_dispatch:

permissions:          # ← Add this at workflow level, not just job level
  contents: read
  id-token: write

jobs:
  test-auth:
    runs-on: ubuntu-latest
    # permissions block here is redundant but harmless — can keep or remove
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Secret Check
        run: |
          echo "Verificando se os segredos possuem conteúdo..."
          if [ -z "${{ secrets.GCP_WIF_PROVIDER }}" ]; then
            echo "ERRO: WIF Provider está VAZIO"
          else
            echo "WIF Provider tem conteúdo"
          fi
          if [ -z "${{ secrets.GCP_SA_EMAIL }}" ]; then
            echo "ERRO: SA Email está VAZIO"
          else
            echo "SA Email tem conteúdo"
          fi

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Instalar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Testar acesso ao GCS
        run: gcloud storage buckets list --project ${{ secrets.GCP_PROJECT_ID }}
        #                                                                         ^ removed trailing period