# .github/workflows/test-auth.yml
name: Teste GCP Auth

on:
  workflow_call:
  workflow_dispatch: 

jobs:
  test-auth:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          # Se der erro, certifique-se que o gh variable list mostra esses nomes exatos
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Instalar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Testar acesso ao GCS
        run: gcloud storage buckets list --project ${{ vars.GCP_PROJECT_ID }}