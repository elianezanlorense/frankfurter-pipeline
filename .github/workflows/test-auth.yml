# .github/workflows/test-auth.yml
name: Teste GCP Auth

on:
  workflow_call:

jobs:
  test-auth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Instalar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setar projeto
        run: gcloud config set project zoocamp-project

      - name: Ver conta autenticada
        run: gcloud config list account --format="value(core.account)"

      - name: Testar acesso ao GCS
        run: gcloud storage buckets list