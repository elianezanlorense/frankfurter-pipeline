name: Airflow CI

on:
  workflow_call:

jobs:
  deploy-dags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          export_environment_variables: true

      - name: Copy DAGs to VM
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/airflow_key
          chmod 600 /tmp/airflow_key
          scp -o StrictHostKeyChecking=no -i /tmp/airflow_key \
            airflow/dags/*.py \
            airflow@${{ secrets.VM_IP }}:/opt/airflow/dags/

      - name: Restart Airflow
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/airflow_key \
            airflow@${{ secrets.VM_IP }} \
            "sudo systemctl restart airflow-scheduler airflow-webserver"