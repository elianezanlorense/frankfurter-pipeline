name: Airflow CI

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Check if VM exists
        id: vm_check
        run: |
          VM=$(gcloud compute instances list \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --filter="name=airflow-vm" \
            --format="value(name)")
          if [ -z "$VM" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "VM não existe, pulando deploy"
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Get VM IP
        id: vm_ip
        if: steps.vm_check.outputs.exists == 'true'
        run: |
          IP=$(gcloud compute instances describe airflow-vm \
            --zone=europe-west1-b \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Copy DAGs to VM
        if: steps.vm_check.outputs.exists == 'true'
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/airflow_key
          chmod 600 /tmp/airflow_key
          for i in {1..10}; do
            ssh -o StrictHostKeyChecking=no -i /tmp/airflow_key \
              airflow@${{ steps.vm_ip.outputs.ip }} \
              "test -d /opt/airflow/dags" && break
            echo "Aguardando startup script... tentativa $i/10"
            sleep 30
          done
          scp -o StrictHostKeyChecking=no -i /tmp/airflow_key \
            airflow/dags/*.py \
            airflow@${{ steps.vm_ip.outputs.ip }}:/opt/airflow/dags/

      - name: Trigger DAG
        if: steps.vm_check.outputs.exists == 'true'
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/airflow_key \
            airflow@${{ steps.vm_ip.outputs.ip }} \
            "source /opt/airflow/venv/bin/activate && \
             export AIRFLOW_HOME=/opt/airflow && \
             for i in \$(seq 1 20); do \
               airflow dags list 2>/dev/null | grep frankfurter_exchange_rates && break; \
               echo \"Aguardando DAG ser registrado... tentativa \$i/20\"; \
               sleep 30; \
             done && \
             airflow dags trigger frankfurter_exchange_rates"
