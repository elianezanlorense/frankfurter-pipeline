name: Terraform CI

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Terraform Apply
        if: inputs.branch == 'dev'
        run: terraform apply -auto-approve -var-file=terraform.tfvars -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Release state lock on failure
        if: failure()
        run: gsutil rm -f gs://zoocamp-project-tf-state/terraform/state/default.tflock || true
