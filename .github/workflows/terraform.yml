name: Terraform CI

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          export_environment_variables: true

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Terraform Apply
        if: inputs.branch == 'dev'
        run: terraform apply -auto-approve -var-file=terraform.tfvars -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Get VM IP
        if: inputs.branch == 'dev'
        id: vm_ip
        run: |
          IP=$(terraform output -raw airflow_vm_external_ip)
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Copy DAGs to VM
        if: inputs.branch == 'dev'
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/airflow_key
          chmod 600 /tmp/airflow_key
          sleep 30
          scp -o StrictHostKeyChecking=no -i /tmp/airflow_key \
            ../../airflow/dags/*.py \
            airflow@${{ steps.vm_ip.outputs.ip }}:/opt/airflow/dags/

      - name: Release state lock on failure
        if: failure()
        run: gsutil rm -f gs://zoocamp-project-tf-state/terraform/state/default.tflock || true