name: Terraform CI

on:
  push:
    branches: [ main, dev ] # Ajuste para as branches que você usa
  pull_request:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to GCP
        # REMOVI O IF: Precisa autenticar sempre para o Terraform ler o bucket de state
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          export_default_credentials: true

      - name: Create GCS bucket if not exists
        # REMOVI O IF: Garantir que o bucket existe antes do Init
        run: |
          BUCKET_NAME="zoocamp-project-tf-state"
          if ! gcloud storage ls gs://$BUCKET_NAME &>/dev/null; then
            echo "Bucket $BUCKET_NAME não existe. Criando..."
            gcloud storage buckets create gs://$BUCKET_NAME \
              --location=us-central1 \
              --uniform-bucket-level-access
            echo "Bucket criado com sucesso!"
          else
            echo "Bucket $BUCKET_NAME já existe."
          fi

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        # REMOVI O IF: É bom ver o Plan em qualquer situação (Push ou PR)
        run: terraform plan -var-file=terraform.tfvars

      - name: Terraform Apply
        # ALTERADO: Agora roda automaticamente se for um PUSH na main ou dev
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        run: terraform apply -auto-approve -var-file=terraform.tfvars