name: Terraform CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to GCP
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          export_default_credentials: true

      - name: Create GCS bucket if not exists
        if: github.event_name != 'pull_request'
        run: |
          BUCKET_NAME="zoocamp-project-tf-state"
          if ! gcloud storage ls gs://$BUCKET_NAME &>/dev/null; then
            echo "Bucket $BUCKET_NAME não existe. Criando..."
            gcloud storage buckets create gs://$BUCKET_NAME \
              --location=us-central1 \
              --uniform-bucket-level-access
            echo "Bucket criado com sucesso!"
          else
            echo "Bucket $BUCKET_NAME já existe."
          fi

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event_name == 'push'
        run: terraform plan -var-file=terraform.tfvars

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve -var-file=terraform.tfvars