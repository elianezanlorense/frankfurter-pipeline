name: Terraform CI

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: 'GCP Project Number'
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          export_default_credentials: true

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -var="project_number=${{ github.event.inputs.project_number }}" -var-file=terraform.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="project_number=${{ github.event.inputs.project_number }}" -var-file=terraform.tfvars

      - name: Release state lock on failure
        if: failure()
        run: gsutil rm -f gs://zoocamp-project-tf-state/terraform/state/default.tflock || true