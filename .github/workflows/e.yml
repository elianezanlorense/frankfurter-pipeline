name: Terraform CI

on:
  pull_request:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (sem backend)
        if: github.ref != 'refs/heads/dev'
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Authenticate to GCP
        if: github.ref == 'refs/heads/dev' || github.event_name == 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions-tf@frankfurter-pipeline.iam.gserviceaccount.com

      - name: Terraform Init (com backend)
        if: github.ref == 'refs/heads/dev' || github.event_name == 'pull_request'
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan -var-file=terraform.tfvars > plan.txt

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 📊 Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

      - name: Upload tfplan
        if: github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./terraform/tfplan

  terraform-apply:
    needs: terraform-plan
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    # 🔥 GERA APROVAÇÃO MANUAL
    environment: dev

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download tfplan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./terraform

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions-tf@frankfurter-pipeline.iam.gserviceaccount.com

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: |
          echo "🚀 Waiting approval..."
          terraform apply -auto-approve tfplan