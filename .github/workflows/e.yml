name: Terraform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          export_default_credentials: true

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        # Passamos o número aqui para ele não perguntar no terminal
        run: terraform plan -var="project_number=198485878590" -var-file=terraform.tfvars

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # Repetimos aqui para garantir a automação total
        run: terraform apply -auto-approve -var="project_number=198485878590" -var-file=terraform.tfvars